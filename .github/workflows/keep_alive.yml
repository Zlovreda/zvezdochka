name: Keep Supabase Active

on:
  schedule:
    # Каждый день в 8:00 UTC (примерно 11:00 МСК). Вы можете изменить время.
    - cron: '0 8 * * *'
  workflow_dispatch:   # позволяет запускать вручную через интерфейс GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Add random delay (up to 2 hours) to avoid fixed pattern
        run: sleep $((RANDOM % 72))

      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -X GET "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --fail --silent --show-error \
            && echo "✅ Supabase ping successful" \
            || echo "❌ Supabase ping failed"
