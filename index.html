<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работа с Supabase</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        h1, h2 { color: #333; }
        input, button {
            padding: 10px;
            margin: 5px 0;
            font-size: 16px;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2563eb; }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #f3f4f6;
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }
        .error { color: red; }
        .success { color: green; }
    </style>
    <!-- Подключаем библиотеку Supabase из CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>✨ Управление данными через Supabase</h1>

    <div>
        <h2>➕ Добавить новую запись</h2>
        <input type="text" id="itemName" placeholder="Название..." style="width: 70%;">
        <button id="addBtn">Добавить</button>
        <div id="addMessage"></div>
    </div>

    <hr>

    <h2>📋 Список записей</h2>
    <ul id="itemsList">
        <li>Загрузка...</li>
    </ul>

    <script>
        // 1. ВАЖНО: ЗАМЕНИТЕ 'YOUR_PROJECT_URL' НА URL ВАШЕГО ПРОЕКТА!
        // Пример: https://ihydjzxctlguvflswzhg.supabase.co
        const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co'; // <--- ЗАМЕНИТЕ ЭТО!
        // Анонимный ключ (ПРАВИЛЬНЫЙ КЛЮЧ ДЛЯ ИСПОЛЬЗОВАНИЯ НА КЛИЕНТЕ)
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjU0NDIsImV4cCI6MjA4NDc0MTQ0Mn0.CLxFjGzqoiH9ixThVj9LMR-UrsPPMSPCla8uhpz6HCo';

        // Инициализируем клиент Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Функция для загрузки данных из таблицы 'items' ---
        async function loadItems() {
            const listElement = document.getElementById('itemsList');
            listElement.innerHTML = '<li>Загрузка...</li>'; // Показываем индикатор загрузки

            try {
                // Делаем запрос к Supabase: выбираем всё из таблицы 'items'
                let { data: items, error } = await supabase
                    .from('items')
                    .select('*')
                    .order('created_at', { ascending: false }); // Сортируем от новых к старым

                if (error) {
                    throw error;
                }

                if (items && items.length > 0) {
                    // Отображаем каждую запись как элемент списка
                    listElement.innerHTML = items.map(item => `
                        <li>
                            <strong>${escapeHtml(item.name)}</strong><br>
                            <small>ID: ${item.id} | Создано: ${new Date(item.created_at).toLocaleString()}</small>
                        </li>
                    `).join('');
                } else {
                    listElement.innerHTML = '<li>Нет записей. Добавьте первую!</li>';
                }
            } catch (err) {
                console.error('Ошибка при загрузке:', err);
                listElement.innerHTML = `<li class="error">Ошибка загрузки: ${err.message}</li>`;
            }
        }

        // --- Функция для добавления новой записи в таблицу 'items' ---
        async function addItem(name) {
            if (!name.trim()) {
                showMessage('addMessage', 'Введите название!', 'error');
                return false;
            }

            try {
                // Делаем запрос на вставку новой строки в таблицу 'items'
                const { data, error } = await supabase
                    .from('items')
                    .insert([{ name: name.trim() }])
                    .select(); // .select() нужен, чтобы вернуть созданную запись

                if (error) {
                    throw error;
                }

                showMessage('addMessage', `Запись "${name}" успешно добавлена!`, 'success');
                document.getElementById('itemName').value = ''; // Очищаем поле ввода
                await loadItems(); // Перезагружаем список
                return true;
            } catch (err) {
                console.error('Ошибка при добавлении:', err);
                showMessage('addMessage', `Ошибка: ${err.message}`, 'error');
                return false;
            }
        }

        // Вспомогательная функция для отображения сообщений пользователю
        function showMessage(elementId, message, type) {
            const msgDiv = document.getElementById(elementId);
            msgDiv.textContent = message;
            msgDiv.className = type === 'error' ? 'error' : 'success';
            setTimeout(() => { msgDiv.textContent = ''; }, 3000);
        }

        // Простая функция для защиты от XSS-атак
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // --- Навешиваем обработчики событий после загрузки страницы ---
        document.addEventListener('DOMContentLoaded', () => {
            loadItems(); // Загружаем записи при старте

            const addButton = document.getElementById('addBtn');
            const nameInput = document.getElementById('itemName');

            addButton.addEventListener('click', () => addItem(nameInput.value));
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addItem(nameInput.value);
            });
        });
    </script>
</body>
</html>
