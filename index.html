<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Мои записи — Supabase + GitHub Pages</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 24px 16px;
      color: #0f172a;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 24px 28px 36px;
      transition: all 0.2s ease;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #1e293b, #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .sub {
      color: #475569;
      border-left: 3px solid #3b82f6;
      padding-left: 14px;
      margin-bottom: 28px;
      font-weight: 400;
      font-size: 0.95rem;
    }
    .form-card {
      background: #f8fafc;
      border-radius: 24px;
      padding: 20px 24px;
      margin-bottom: 32px;
      border: 1px solid #e2e8f0;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #1e293b;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      background: white;
      transition: 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    button:hover {
      background: #2563eb;
      transform: scale(0.97);
    }
    .status {
      margin: 16px 0 0;
      padding: 10px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      background: #eef2ff;
      color: #1e40af;
      display: inline-block;
    }
    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .item-list li {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 60px;
      padding: 12px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.1s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .item-name {
      font-weight: 500;
      word-break: break-word;
      font-size: 1rem;
    }
    .item-date {
      font-size: 0.7rem;
      color: #64748b;
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 40px;
      margin-left: 12px;
      white-space: nowrap;
    }
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      background: #fef9e3;
      border-radius: 40px;
      color: #b45309;
      border: 1px dashed #fde68a;
    }
    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      text-align: center;
      color: #62748c;
      border-top: 1px solid #e2e8f0;
      padding-top: 24px;
    }
    @media (max-width: 550px) {
      .container { padding: 20px 18px; }
      .item-list li { flex-direction: column; align-items: flex-start; gap: 6px; border-radius: 28px; }
      .item-date { margin-left: 0; align-self: flex-start; }
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
    .btn-small {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 6px 14px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✨ Звездочка</h1>
  <div class="sub">Сохраняем данные в Supabase • Читаем и пишем</div>

  <div class="form-card">
    <div class="form-group">
      <label>📝 Название / текст</label>
      <input type="text" id="itemName" placeholder="Например: Вдохновение, Заметка, Идея..." autocomplete="off">
    </div>
    <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
      <button id="saveBtn">➕ Добавить запись</button>
      <button id="refreshBtn" class="btn-small" style="background:#f1f5f9; color:#334155;">🔄 Обновить список</button>
    </div>
    <div id="statusMsg" class="status">✅ Готово к работе</div>
  </div>

  <div style="margin-top: 8px;">
    <h3 style="font-weight: 500; font-size: 1.25rem;">📋 Последние записи</h3>
    <ul id="itemsList" class="item-list">
      <li style="justify-content: center; opacity: 0.7;">Загрузка данных...</li>
    </ul>
  </div>
  <footer>
    ⚡ GitHub Pages + Supabase • Данные защищены Row Level Security
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // --- КОНФИГУРАЦИЯ (данные вашего проекта) ---
  // Project URL формируется автоматически из ID: https://<project_ref>.supabase.co
  const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjU0NDIsImV4cCI6MjA4NDc0MTQ0Mn0.CLxFjGzqoiH9ixThVj9LMR-UrsPPMSPCla8uhpz6HCo';
  // Имя таблицы (создайте через SQL-редактор)
  const TABLE_NAME = 'items';

  // Инициализируем клиент Supabase
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM элементы
  const itemInput = document.getElementById('itemName');
  const saveBtn = document.getElementById('saveBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const itemsList = document.getElementById('itemsList');
  const statusDiv = document.getElementById('statusMsg');

  // Вспомогательная функция: показать временное сообщение
  function setStatus(text, isError = false) {
    statusDiv.textContent = text;
    statusDiv.style.background = isError ? '#fee2e2' : '#eef2ff';
    statusDiv.style.color = isError ? '#b91c1c' : '#1e40af';
    setTimeout(() => {
      if (statusDiv.textContent === text) {
        statusDiv.style.background = '#eef2ff';
        statusDiv.style.color = '#1e40af';
        statusDiv.textContent = '✅ Готово';
      }
    }, 2800);
  }

  // ЗАГРУЗКА ДАННЫХ (читаем из Supabase)
  async function loadItems() {
    try {
      setStatus('⏳ Загрузка записей...');
      const { data, error } = await supabase
        .from(TABLE_NAME)
        .select('*')
        .order('created_at', { ascending: false }); // новые сверху

      if (error) throw error;

      if (!data || data.length === 0) {
        itemsList.innerHTML = '<li class="empty-msg">📭 Пока ничего нет. Добавьте первую запись!</li>';
        setStatus('✨ Нет данных — добавьте что-нибудь');
        return;
      }

      // Рендерим список
      itemsList.innerHTML = '';
      data.forEach(item => {
        const li = document.createElement('li');
        const nameSpan = document.createElement('span');
        nameSpan.className = 'item-name';
        nameSpan.textContent = item.name || 'Без названия';

        const dateSpan = document.createElement('span');
        dateSpan.className = 'item-date';
        // Красиво форматируем дату
        if (item.created_at) {
          const date = new Date(item.created_at);
          dateSpan.textContent = date.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        } else {
          dateSpan.textContent = 'только что';
        }

        li.appendChild(nameSpan);
        li.appendChild(dateSpan);
        itemsList.appendChild(li);
      });
      setStatus(`✅ Загружено ${data.length} записей`);
    } catch (err) {
      console.error('Ошибка при загрузке:', err);
      itemsList.innerHTML = `<li class="empty-msg" style="background:#fee2e2; color:#b91c1c;">⚠️ Не удалось загрузить данные. Убедитесь, что таблица "${TABLE_NAME}" создана и RLS настроен.</li>`;
      setStatus(`❌ Ошибка: ${err.message}`, true);
    }
  }

  // ДОБАВЛЕНИЕ ЗАПИСИ
  async function addItem() {
    const nameValue = itemInput.value.trim();
    if (!nameValue) {
      setStatus('⚠️ Введите текст перед сохранением', true);
      itemInput.focus();
      return;
    }

    // Блокируем кнопку на время отправки
    saveBtn.disabled = true;
    const originalBtnText = saveBtn.innerHTML;
    saveBtn.innerHTML = '⏳ Сохранение...';

    try {
      const { data, error } = await supabase
        .from(TABLE_NAME)
        .insert([{ name: nameValue }])
        .select();

      if (error) throw error;

      // Очищаем поле и обновляем список
      itemInput.value = '';
      setStatus('🎉 Запись успешно добавлена!');
      await loadItems(); // перезагружаем список
    } catch (err) {
      console.error('Insert error:', err);
      setStatus(`❌ Не удалось добавить: ${err.message}`, true);
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = originalBtnText;
      itemInput.focus();
    }
  }

  // --- Обработчики событий ---
  saveBtn.addEventListener('click', addItem);
  refreshBtn.addEventListener('click', loadItems);
  // Добавление по Enter в поле ввода
  itemInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addItem();
    }
  });

  // ПЕРВИЧНАЯ ЗАГРУЗКА ПРИ СТАРТЕ
  loadItems();
</script>
</body>
</html>
