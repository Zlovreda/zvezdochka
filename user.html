<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-house-door"></i> Личный кабинет</h2>
            <button id="logoutBtn" class="btn btn-outline-danger">Выйти</button>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">Передать показания</div>
                    <div class="card-body">
                        <label>Месяц (первое число)</label>
                        <input type="month" id="readingMonth" class="form-control mb-2">
                        <label>Показания счётчика (кВт·ч)</label>
                        <input type="number" step="0.01" id="readingValue" class="form-control mb-2">
                        <button id="submitReadingBtn" class="btn btn-success w-100">Отправить</button>
                        <div id="readingMsg" class="mt-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">Мои долги</div>
                    <div class="card-body">
                        <h5>За электричество: <span id="debtElectric" class="text-danger">0.00 ₽</span></h5>
                        <h5>Членские взносы: <span id="debtFees" class="text-danger">0.00 ₽</span></h5>
                        <hr>
                        <h4>Итого: <span id="totalDebt" class="text-danger">0.00 ₽</span></h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-secondary text-white">История</div>
            <div class="card-body">
                <ul class="nav nav-tabs" id="historyTabs">
                    <li class="nav-item"><button class="nav-link active" data-tab="electric">Электричество</button></li>
                    <li class="nav-item"><button class="nav-link" data-tab="fees">Взносы</button></li>
                </ul>
                <div id="electricHistory" class="mt-3">
                    <table class="table table-striped">
                        <thead><tr><th>Месяц</th><th>Показания</th><th>Расход</th><th>Начислено</th><th>Оплачено</th></tr></thead>
                        <tbody id="electricBody"><tr><td colspan="5">Загрузка...</td></tr>
                    </table>
                </div>
                <div id="feesHistory" style="display:none;" class="mt-3">
                    <table class="table table-striped">
                        <thead><tr><th>Месяц</th><th>Сумма (₽)</th><th>Оплачено</th></tr></thead>
                        <tbody id="feesBody"><td><td colspan="3">Загрузка...</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjU0NDIsImV4cCI6MjA4NDc0MTQ0Mn0.CLxFjGzqoiH9ixThVj9LMR-UrsPPMSPCla8uhpz6HCo';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        async function checkAuth() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return window.location.href = 'index.html';
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== 'user') window.location.href = 'admin.html';
        }

        async function loadDebts() {
            // Долг по электричеству
            const { data: elec } = await supabaseClient.from('readings').select('amount').eq('user_id', currentUser.id).eq('paid', false);
            const elecDebt = (elec || []).reduce((s, r) => s + (r.amount || 0), 0);
            // Долг по взносам
            const { data: fees } = await supabaseClient.from('fee_charges').select('total_amount').eq('user_id', currentUser.id).eq('paid', false);
            const feesDebt = (fees || []).reduce((s, f) => s + (f.total_amount || 0), 0);
            document.getElementById('debtElectric').innerText = elecDebt.toFixed(2) + ' ₽';
            document.getElementById('debtFees').innerText = feesDebt.toFixed(2) + ' ₽';
            document.getElementById('totalDebt').innerText = (elecDebt + feesDebt).toFixed(2) + ' ₽';
        }

        async function loadElectricHistory() {
            const { data } = await supabaseClient.from('readings').select('*').eq('user_id', currentUser.id).order('reading_date', { ascending: false });
            const tbody = document.getElementById('electricBody');
            if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="5">Нет показаний</td></tr>'; return; }
            // Для расчёта расхода нужна сортировка
            const sorted = [...data].sort((a,b) => new Date(a.reading_date) - new Date(b.reading_date));
            tbody.innerHTML = data.map(r => {
                let consumption = '';
                const prev = sorted.find(p => new Date(p.reading_date) < new Date(r.reading_date));
                if (prev) consumption = (r.value - prev.value).toFixed(2);
                return `
                    <tr>
                        <td>${new Date(r.reading_date).toLocaleDateString('ru')}</td>
                        <td>${r.value}</td>
                        <td>${consumption}</td>
                        <td>${r.amount ? r.amount + ' ₽' : '—'}</td>
                        <td>${r.paid ? '✅' : '❌'}</td>
                    </tr>
                `;
            }).join('');
        }

        async function loadFeesHistory() {
            const { data } = await supabaseClient.from('fee_charges').select('*').eq('user_id', currentUser.id).order('charge_date', { ascending: false });
            const tbody = document.getElementById('feesBody');
            if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="3">Нет начислений</td></tr>'; return; }
            tbody.innerHTML = data.map(f => `
                <tr>
                    <td>${new Date(f.charge_date).toLocaleDateString('ru')}</td>
                    <td>${f.total_amount} ₽</td>
                    <td>${f.paid ? '✅' : '❌'}</td>
                </tr>
            `).join('');
        }

        async function submitReading() {
            const month = document.getElementById('readingMonth').value;
            const value = parseFloat(document.getElementById('readingValue').value);
            if (!month || isNaN(value)) return showMsg('readingMsg', 'Заполните все поля', 'danger');
            const readingDate = new Date(month + '-01');
            if (readingDate > new Date()) return showMsg('readingMsg', 'Нельзя за будущий месяц', 'danger');
            // Получаем предыдущее показание
            const { data: prev } = await supabaseClient.from('readings').select('value').eq('user_id', currentUser.id).lt('reading_date', readingDate.toISOString()).order('reading_date', { ascending: false }).limit(1);
            let consumption = 0;
            if (prev && prev.length) consumption = value - prev[0].value;
            if (consumption < 0) return showMsg('readingMsg', 'Новое показание не может быть меньше предыдущего', 'danger');
            // Загружаем тарифы
            const { data: t1 } = await supabaseClient.from('settings').select('value').eq('key', 'tariff_T1').single();
            const { data: t2 } = await supabaseClient.from('settings').select('value').eq('key', 'tariff_T2').single();
            const { data: t3 } = await supabaseClient.from('settings').select('value').eq('key', 'tariff_T3').single();
            const tariffT1 = parseFloat(t1?.value || 6.2);
            const tariffT2 = parseFloat(t2?.value || 7.42);
            const tariffT3 = parseFloat(t3?.value || 0.36);
            let amount = consumption * tariffT3;
            if (consumption > 0) amount += Math.min(consumption, 100) * tariffT1;
            if (consumption > 100) amount += (consumption - 100) * tariffT2;
            amount = Math.round(amount * 100) / 100;
            const { error } = await supabaseClient.from('readings').insert({
                user_id: currentUser.id,
                reading_date: readingDate.toISOString(),
                value,
                amount,
                paid: false
            });
            if (error) {
                if (error.code === '23505') showMsg('readingMsg', 'Показания за этот месяц уже есть', 'danger');
                else showMsg('readingMsg', 'Ошибка: ' + error.message, 'danger');
            } else {
                showMsg('readingMsg', 'Показания переданы', 'success');
                document.getElementById('readingValue').value = '';
                loadElectricHistory();
                loadDebts();
            }
        }

        function showMsg(elId, msg, type) {
            const div = document.getElementById(elId);
            div.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; });
        document.getElementById('submitReadingBtn').addEventListener('click', submitReading);
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');
                document.getElementById('electricHistory').style.display = tab === 'electric' ? 'block' : 'none';
                document.getElementById('feesHistory').style.display = tab === 'fees' ? 'block' : 'none';
                document.querySelectorAll('#historyTabs .nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
                if (tab === 'fees') loadFeesHistory();
            });
        });

        (async () => {
            await checkAuth();
            await loadDebts();
            await loadElectricHistory();
        })();
    </script>
</body>
</html>
