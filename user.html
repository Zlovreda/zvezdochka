<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - ЭнергоУчет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .debt-card { background: linear-gradient(135deg, #ff6b6b, #c92a2a); color: white; }
        .info-card { background: #f8f9fa; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-house-heart"></i> Личный кабинет СНТ "Звёздочка"</h2>
        <button id="logoutBtn" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Выйти</button>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card debt-card">
                <div class="card-body">
                    <h5>Общая задолженность</h5>
                    <h2 id="totalDebt">0 ₽</h2>
                    <small>Включая электричество и взносы</small>
                </div>
            </div>
        </div>
        <div class="col-md-8 info-card card">
            <div class="card-body">
                <h5>Мои данные</h5>
                <p><strong>ФИО:</strong> <span id="userFullName"></span><br>
                <strong>Участок (доля):</strong> <span id="userPlots"></span><br>
                <strong>Соток:</strong> <span id="userArea"></span></p>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">Передать показания</div>
                <div class="card-body">
                    <select id="meterSelect" class="form-select mb-2"></select>
                    <label>Месяц (первое число)</label>
                    <input type="month" id="readingMonth" class="form-control mb-2">
                    <label>Текущие показания (кВт·ч)</label>
                    <input type="number" step="0.01" id="readingValue" class="form-control mb-2" placeholder="например 1250.5">
                    <button id="submitReadingBtn" class="btn btn-success w-100">Отправить</button>
                    <div id="readingMsg" class="mt-2"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header bg-info text-white">Последние показания</div>
                <div class="card-body">
                    <table class="table table-sm">
                        <thead><tr><th>Счётчик</th><th>Месяц</th><th>Показание</th></tr></thead>
                        <tbody id="lastReadingsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-warning text-dark">Мои счета</div>
                <div class="card-body">
                    <table class="table table-bordered table-sm" id="invoicesTable">
                        <thead><tr><th>Месяц</th><th>Электричество</th><th>Взнос (участок)</th><th>Взнос (сотки)</th><th>Итого</th><th>Оплачено</th></tr></thead>
                        <tbody id="invoicesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjU0NDIsImV4cCI6MjA4NDc0MTQ0Mn0.CLxFjGzqoiH9ixThVj9LMR-UrsPPMSPCla8uhpz6HCo';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function checkAuth() {
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) return window.location.href = 'index.html';
        currentUser = JSON.parse(userStr);
        if (currentUser.role !== 'user') window.location.href = 'admin.html';
        document.getElementById('userFullName').innerText = currentUser.full_name || currentUser.username;
        document.getElementById('userPlots').innerText = currentUser.plots_count ?? 1;
        document.getElementById('userArea').innerText = currentUser.area_sotok ?? 0;
    }

    async function loadDebt() {
        // Сумма неоплаченных счетов (invoices)
        const { data: invoices } = await supabaseClient
            .from('invoices')
            .select('total')
            .eq('user_id', currentUser.id)
            .eq('paid', false);
        let debt = invoices.reduce((sum, i) => sum + (i.total || 0), 0);
        // Плюс неоплаченные дополнительные сборы
        const { data: extraFees } = await supabaseClient
            .from('user_extra_fees')
            .select('amount')
            .eq('user_id', currentUser.id)
            .eq('paid', false);
        debt += extraFees.reduce((sum, f) => sum + (f.amount || 0), 0);
        document.getElementById('totalDebt').innerText = debt.toFixed(2) + ' ₽';
    }

    async function loadInvoices() {
        const { data, error } = await supabaseClient
            .from('invoices')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('year_month', { ascending: false });
        if (error) return console.error(error);
        const tbody = document.getElementById('invoicesBody');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="6">Нет счетов</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(i => `
            <tr>
                <td>${i.year_month.slice(0,7)}</td>
                <td>${i.electricity_amount.toFixed(2)}</td>
                <td>${i.plot_fee.toFixed(2)}</td>
                <td>${i.area_fee.toFixed(2)}</td>
                <td>${i.total.toFixed(2)}</td>
                <td>${i.paid ? '<span class="badge bg-success">Оплачено</span>' : '<span class="badge bg-danger">Не оплачено</span>'}</td>
            </tr>
        `).join('');
    }

    async function loadMeters() {
        const { data, error } = await supabaseClient.from('meters').select('id, name').eq('user_id', currentUser.id);
        if (error) return console.error(error);
        const select = document.getElementById('meterSelect');
        select.innerHTML = data.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        if (data.length) loadLastReadings(data[0].id);
    }

    async function loadLastReadings(meterId) {
        const { data, error } = await supabaseClient
            .from('readings')
            .select('reading_date, value')
            .eq('meter_id', meterId)
            .order('reading_date', { ascending: false })
            .limit(3);
        if (error) return;
        const tbody = document.getElementById('lastReadingsBody');
        tbody.innerHTML = data.map(r => `
            <tr><td>${meterId === +meterSelect.value ? 'Выбранный' : 'Счётчик'}</td><td>${r.reading_date.slice(0,7)}</td><td>${r.value}</td></tr>
        `).join('');
    }

    document.getElementById('meterSelect').addEventListener('change', (e) => loadLastReadings(e.target.value));

    async function submitReading() {
        const meterId = document.getElementById('meterSelect').value;
        const month = document.getElementById('readingMonth').value;
        const value = parseFloat(document.getElementById('readingValue').value);
        if (!meterId || !month || isNaN(value)) {
            showMsg('readingMsg', 'Заполните все поля', 'danger');
            return;
        }
        const readingDate = month + '-01';
        const targetDate = new Date(readingDate);
        if (targetDate > new Date()) {
            showMsg('readingMsg', 'Нельзя передавать за будущие месяцы', 'danger');
            return;
        }
        // Проверка, нет ли уже показания за этот месяц
        const { data: existing } = await supabaseClient
            .from('readings')
            .select('id')
            .eq('meter_id', meterId)
            .eq('reading_date', readingDate);
        if (existing && existing.length) {
            showMsg('readingMsg', 'Показания за этот месяц уже переданы', 'danger');
            return;
        }
        const { error } = await supabaseClient.from('readings').insert({
            meter_id: meterId,
            reading_date: readingDate,
            value: value
        });
        if (error) showMsg('readingMsg', 'Ошибка: ' + error.message, 'danger');
        else {
            showMsg('readingMsg', 'Показания приняты!', 'success');
            document.getElementById('readingValue').value = '';
            loadLastReadings(meterId);
        }
    }

    function showMsg(elId, msg, type) {
        const div = document.getElementById(elId);
        div.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        setTimeout(() => div.innerHTML = '', 3000);
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    });
    document.getElementById('submitReadingBtn').addEventListener('click', submitReading);

    (async () => {
        await checkAuth();
        await loadMeters();
        await loadInvoices();
        await loadDebt();
    })();
</script>
</body>
</html>
