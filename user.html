<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-house-door"></i> Личный кабинет</h2>
            <button id="logoutBtn" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Выйти</button>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">Передать показания</div>
                    <div class="card-body">
                        <label class="form-label">Месяц (первое число)</label>
                        <input type="month" id="readingMonth" class="form-control mb-2" required>
                        <label class="form-label">Показания счётчика (кВт·ч)</label>
                        <input type="number" step="0.01" id="readingValue" class="form-control mb-2" placeholder="например 1250.5">
                        <button id="submitReadingBtn" class="btn btn-success w-100">Отправить</button>
                        <div id="readingMsg" class="mt-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">Мой долг</div>
                    <div class="card-body">
                        <h3 id="debtAmount" class="text-danger">0.00 ₽</h3>
                        <p class="text-muted">Сумма неоплаченных начислений</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-secondary text-white">История показаний</div>
            <div class="card-body">
                <table class="table table-striped" id="historyTable">
                    <thead><tr><th>Месяц</th><th>Показания</th><th>Начислено</th><th>Оплачено</th></tr></thead>
                    <tbody id="historyBody"><tr><td colspan="4">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NzY5MzUsImV4cCI6MjA4NDU1MjkzNX0.KvpKM7FggBOWNuFR8gmL7cjk64tt6CCgAI-UlkP7ZXU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        async function checkAuth() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return window.location.href = 'index.html';
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== 'user') window.location.href = 'admin.html';
        }

        async function loadDebt() {
            const { data, error } = await supabaseClient
                .from('readings')
                .select('amount')
                .eq('user_id', currentUser.id)
                .eq('paid', false);
            if (error) return console.error(error);
            const total = data.reduce((sum, r) => sum + (r.amount || 0), 0);
            document.getElementById('debtAmount').innerText = total.toFixed(2) + ' ₽';
        }

        async function loadHistory() {
            const { data, error } = await supabaseClient
                .from('readings')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('reading_date', { ascending: false });
            if (error) throw error;
            const tbody = document.getElementById('historyBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4">Нет показаний</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${new Date(r.reading_date).toLocaleDateString('ru', { month:'long', year:'numeric' })}</td>
                    <td>${r.value}</td>
                    <td>${r.amount ? r.amount + ' ₽' : '—'}</td>
                    <td>${r.paid ? '<span class="badge bg-success">Оплачено</span>' : '<span class="badge bg-warning">Не оплачено</span>'}</td>
                </tr>
            `).join('');
        }

        async function submitReading() {
            const monthInput = document.getElementById('readingMonth').value;
            const value = parseFloat(document.getElementById('readingValue').value);
            if (!monthInput || isNaN(value)) {
                showMsg('readingMsg', 'Заполните месяц и показания', 'danger');
                return;
            }
            const readingDate = new Date(monthInput + '-01');
            if (readingDate > new Date()) {
                showMsg('readingMsg', 'Нельзя передавать показания за будущие месяцы', 'danger');
                return;
            }

            const { data: tariffData } = await supabaseClient.from('settings').select('value').eq('key', 'tariff').single();
            const tariff = parseFloat(tariffData?.value || 4.0);

            const { data: prevReading } = await supabaseClient
                .from('readings')
                .select('value')
                .eq('user_id', currentUser.id)
                .lt('reading_date', readingDate.toISOString())
                .order('reading_date', { ascending: false })
                .limit(1);
            let consumption = 0;
            if (prevReading && prevReading.length > 0) {
                consumption = value - prevReading[0].value;
                if (consumption < 0) {
                    showMsg('readingMsg', 'Новое показание не может быть меньше предыдущего', 'danger');
                    return;
                }
            }
            const amount = consumption * tariff;

            const { error } = await supabaseClient
                .from('readings')
                .insert({
                    user_id: currentUser.id,
                    reading_date: readingDate.toISOString(),
                    value: value,
                    amount: amount > 0 ? amount : null,
                    paid: false
                });
            if (error) {
                if (error.code === '23505') showMsg('readingMsg', 'Показания за этот месяц уже переданы', 'danger');
                else showMsg('readingMsg', 'Ошибка: ' + error.message, 'danger');
            } else {
                showMsg('readingMsg', 'Показания успешно переданы!', 'success');
                document.getElementById('readingValue').value = '';
                loadHistory();
                loadDebt();
            }
        }

        function showMsg(elId, msg, type) {
            const div = document.getElementById(elId);
            div.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
        document.getElementById('submitReadingBtn').addEventListener('click', submitReading);

        (async () => {
            await checkAuth();
            await loadDebt();
            await loadHistory();
        })();
    </script>
</body>
</html>
