<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-house-door"></i> Личный кабинет</h2>
            <button id="logoutBtn" class="btn btn-outline-danger">Выйти</button>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">Передать показания</div>
                    <div class="card-body">
                        <label>Счётчик</label>
                        <select id="meterSelect" class="form-select mb-2"></select>
                        <label>Месяц</label><input type="month" id="readingMonth" class="form-control mb-2">
                        <label>Показания (кВт·ч)</label><input type="number" step="0.01" id="readingValue" class="form-control mb-2">
                        <button id="submitReadingBtn" class="btn btn-success w-100">Отправить</button>
                        <div id="readingMsg"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">Мои долги</div>
                    <div class="card-body">
                        <h5>За электричество: <span id="debtElectricity" class="text-danger">0.00 ₽</span></h5>
                        <h5>Членские взносы: <span id="debtFees" class="text-danger">0.00 ₽</span></h5>
                        <h5>Общий долг: <span id="totalDebt" class="text-danger">0.00 ₽</span></h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header bg-secondary text-white">История показаний</div>
            <div class="card-body">
                <table class="table table-striped" id="historyTable"><thead><tr><th>Счётчик</th><th>Месяц</th><th>Показания</th><th>Начислено за эл.</th><th>Оплачено</th></tr></thead><tbody id="historyBody"><tr><td colspan="5">Загрузка...</td></tr></tbody></table>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NzY5MzUsImV4cCI6MjA4NDU1MjkzNX0.KvpKM7FggBOWNuFR8gmL7cjk64tt6CCgAI-UlkP7ZXU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        async function checkAuth() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return window.location.href = 'index.html';
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== 'user') window.location.href = 'admin.html';
        }

        async function loadMeters() {
            const { data: meters } = await supabaseClient.from('meters').select('*').eq('user_id', currentUser.id);
            const select = document.getElementById('meterSelect');
            select.innerHTML = meters.map(m => `<option value="${m.id}">${m.meter_name}</option>`).join('');
            if (meters.length) loadDebt();
        }

        async function loadDebt() {
            // Долг по электричеству (неоплаченные показания)
            const { data: unpaidElectric } = await supabaseClient.from('readings').select('amount_electricity').eq('user_id', currentUser.id).eq('paid_electricity', false);
            const debtEl = unpaidElectric.reduce((s,r)=>s+(r.amount_electricity||0),0);
            // Долг по взносам
            const { data: unpaidFees } = await supabaseClient.from('fees').select('amount_plot, amount_area').eq('user_id', currentUser.id).eq('paid_fees', false);
            const debtFees = unpaidFees.reduce((s,f)=>s+(f.amount_plot||0)+(f.amount_area||0),0);
            document.getElementById('debtElectricity').innerText = debtEl.toFixed(2)+' ₽';
            document.getElementById('debtFees').innerText = debtFees.toFixed(2)+' ₽';
            document.getElementById('totalDebt').innerText = (debtEl+debtFees).toFixed(2)+' ₽';
        }

        async function loadHistory() {
            const { data: readings } = await supabaseClient.from('readings').select('*, meters(meter_name)').eq('user_id', currentUser.id).order('reading_date', { ascending: false });
            const tbody = document.getElementById('historyBody');
            if (!readings.length) { tbody.innerHTML = '<tr><td colspan="5">Нет показаний</td></tr>'; return; }
            tbody.innerHTML = readings.map(r => `<tr>
                <td>${r.meters?.meter_name || '?'}</td>
                <td>${new Date(r.reading_date).toLocaleDateString()}</td>
                <td>${r.value}</td>
                <td>${r.amount_electricity ? r.amount_electricity+' ₽' : '—'}</td>
                <td>${r.paid_electricity ? '✅' : '❌'}</td>
            </tr>`).join('');
        }

        async function submitReading() {
            const meterId = document.getElementById('meterSelect').value;
            const month = document.getElementById('readingMonth').value;
            const value = parseFloat(document.getElementById('readingValue').value);
            if (!meterId || !month || isNaN(value)) { alert('Заполните все поля'); return; }
            const readingDate = month+'-01';
            // Получить предыдущее показание
            const { data: prev } = await supabaseClient.from('readings').select('value').eq('meter_id', meterId).lt('reading_date', readingDate).order('reading_date', { ascending: false }).limit(1);
            let consumption = value;
            if (prev.length) consumption = value - prev[0].value;
            if (consumption < 0) { alert('Новое показание меньше предыдущего'); return; }
            // Получить тарифы
            const { data: tariffs } = await supabaseClient.from('settings').select('value').in('key', ['tariff_T1','tariff_T2','tariff_T3']);
            const t1 = parseFloat(tariffs.find(t=>t.key==='tariff_T1').value);
            const t2 = parseFloat(tariffs.find(t=>t.key==='tariff_T2').value);
            const t3 = parseFloat(tariffs.find(t=>t.key==='tariff_T3').value);
            let amount = consumption*t3 + Math.min(consumption,100)*t1;
            if (consumption>100) amount += (consumption-100)*t2;
            const { error } = await supabaseClient.from('readings').insert({
                meter_id: meterId, reading_date: readingDate, value: value,
                amount_electricity: amount, paid_electricity: false
            });
            if (error) alert('Ошибка: '+error.message);
            else {
                alert('Показания переданы');
                document.getElementById('readingValue').value = '';
                loadDebt();
                loadHistory();
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('currentUser'); window.location.href='index.html'; });
        document.getElementById('submitReadingBtn').addEventListener('click', submitReading);

        (async () => {
            await checkAuth();
            await loadMeters();
            await loadHistory();
        })();
    </script>
</body>
</html>
