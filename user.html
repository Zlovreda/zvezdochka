<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-house-door"></i> Личный кабинет</h2>
            <button id="logoutBtn" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Выйти</button>
        </div>

        <!-- Информация о пользователе -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">Ваши данные</div>
            <div class="card-body" id="userInfo"></div>
        </div>

        <!-- Форма передачи показаний (по каждому счётчику) -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white">Передать показания</div>
            <div class="card-body" id="metersForm"></div>
            <div id="readingMsg" class="mx-3 mb-3"></div>
        </div>

        <!-- Долги и платежи -->
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-warning">Задолженность по электроэнергии</div>
                    <div class="card-body">
                        <h3 id="debtElectricity" class="text-danger">0.00 ₽</h3>
                        <button id="payElectricityBtn" class="btn btn-sm btn-outline-success mt-2">Оплатить всё</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header bg-info">Задолженность по взносам</div>
                    <div class="card-body">
                        <p><strong>За участок (зарплата):</strong> <span id="debtSalaryFee">0.00 ₽</span></p>
                        <p><strong>За сотки (содержание):</strong> <span id="debtMaintenanceFee">0.00 ₽</span></p>
                        <button id="payFeesBtn" class="btn btn-sm btn-outline-success">Оплатить все взносы</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- История показаний по счётчикам -->
        <div class="card">
            <div class="card-header bg-secondary text-white">История показаний</div>
            <div class="card-body" id="historyContainer"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NzY5MzUsImV4cCI6MjA4NDU1MjkzNX0.KvpKM7FggBOWNuFR8gmL7cjk64tt6CCgAI-UlkP7ZXU';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let metersList = [];

        async function checkAuth() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return window.location.href = 'index.html';
            currentUser = JSON.parse(userStr);
            if (currentUser.role !== 'user') window.location.href = 'admin.html';
            document.getElementById('userInfo').innerHTML = `
                <p><strong>${currentUser.full_name}</strong> | Участок ${currentUser.plot_number} | Участков: ${currentUser.plots_count} | Соток: ${currentUser.land_area}</p>
            `;
            await loadMeters();
            await loadDebts();
            await loadHistory();
        }

        async function loadMeters() {
            const { data, error } = await supabaseClient
                .from('meters')
                .select('*')
                .eq('user_id', currentUser.id);
            if (error) return;
            metersList = data;
            const formDiv = document.getElementById('metersForm');
            if (!metersList.length) {
                formDiv.innerHTML = '<p>У вас нет ни одного счётчика. Обратитесь к администратору.</p>';
                return;
            }
            let html = '';
            for (const meter of metersList) {
                html += `
                    <div class="border p-3 mb-3 rounded">
                        <h5>Счётчик: ${meter.meter_name} (${meter.serial_number || 'без номера'})</h5>
                        <label class="form-label">Месяц показаний (первое число)</label>
                        <input type="month" id="month_${meter.id}" class="form-control mb-2">
                        <label class="form-label">Текущие показания (кВт·ч)</label>
                        <input type="number" step="0.01" id="value_${meter.id}" class="form-control mb-2" placeholder="например 1250.5">
                        <button class="btn btn-primary" onclick="submitReading(${meter.id})">Отправить показания</button>
                    </div>
                `;
            }
            formDiv.innerHTML = html;
        }

        window.submitReading = async (meterId) => {
            const monthInput = document.getElementById(`month_${meterId}`).value;
            const value = parseFloat(document.getElementById(`value_${meterId}`).value);
            if (!monthInput || isNaN(value)) {
                showMsg('readingMsg', 'Заполните месяц и показания', 'danger');
                return;
            }
            const readingDate = new Date(monthInput + '-01');
            if (readingDate > new Date()) {
                showMsg('readingMsg', 'Нельзя передавать за будущие месяцы', 'danger');
                return;
            }

            // Получаем предыдущее показание для этого счётчика
            const { data: prevReadings } = await supabaseClient
                .from('readings')
                .select('value')
                .eq('meter_id', meterId)
                .lt('reading_date', readingDate.toISOString())
                .order('reading_date', { ascending: false })
                .limit(1);
            let consumption = 0;
            if (prevReadings && prevReadings.length > 0) {
                consumption = value - prevReadings[0].value;
                if (consumption < 0) {
                    showMsg('readingMsg', 'Новое показание меньше предыдущего', 'danger');
                    return;
                }
            } else {
                // первое показание – потребление 0, начислений нет
                consumption = 0;
            }

            // Рассчитываем сумму по трёхсоставному тарифу
            let amount = 0;
            if (consumption > 0) {
                const { data: tariffs } = await supabaseClient
                    .from('tariffs')
                    .select('*')
                    .order('min_kwh');
                let remaining = consumption;
                for (const t of tariffs) {
                    let limit = t.max_kwh === null ? Infinity : t.max_kwh;
                    let rangeKwh = Math.min(remaining, limit - t.min_kwh);
                    if (rangeKwh > 0) {
                        amount += rangeKwh * t.rate;
                        remaining -= rangeKwh;
                        if (remaining <= 0) break;
                    }
                }
            }

            // Вставляем показание
            const { error } = await supabaseClient
                .from('readings')
                .insert({
                    meter_id: meterId,
                    reading_date: readingDate.toISOString(),
                    value: value,
                    consumption: consumption,
                    amount_electricity: amount > 0 ? amount : null,
                    paid_electricity: false
                });
            if (error) {
                if (error.code === '23505') showMsg('readingMsg', 'Показания за этот месяц уже переданы', 'danger');
                else showMsg('readingMsg', 'Ошибка: ' + error.message, 'danger');
            } else {
                showMsg('readingMsg', 'Показания успешно переданы!', 'success');
                document.getElementById(`value_${meterId}`).value = '';
                await loadDebts();
                await loadHistory();
            }
        };

        async function loadDebts() {
            // Долг по электроэнергии (неоплаченные amount_electricity)
            const { data: electDebt } = await supabaseClient
                .from('readings')
                .select('amount_electricity')
                .eq('paid_electricity', false)
                .eq('meter_id', supabaseClient.from('meters').select('id').eq('user_id', currentUser.id));
            // Упростим: получим все показания пользователя
            const { data: meters } = await supabaseClient.from('meters').select('id').eq('user_id', currentUser.id);
            const meterIds = meters.map(m => m.id);
            const { data: unpaidReadings } = await supabaseClient
                .from('readings')
                .select('amount_electricity')
                .in('meter_id', meterIds)
                .eq('paid_electricity', false);
            let totalElect = 0;
            if (unpaidReadings) unpaidReadings.forEach(r => totalElect += r.amount_electricity || 0);
            document.getElementById('debtElectricity').innerText = totalElect.toFixed(2) + ' ₽';

            // Долги по взносам: смотрим payments за текущий месяц и ранее
            const currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
            const { data: salaryPayments } = await supabaseClient
                .from('payments')
                .select('amount, paid')
                .eq('user_id', currentUser.id)
                .eq('type', 'salary_fee')
                .eq('month', currentMonth.toISOString());
            const { data: maintenancePayments } = await supabaseClient
                .from('payments')
                .select('amount, paid')
                .eq('user_id', currentUser.id)
                .eq('type', 'maintenance_fee')
                .eq('month', currentMonth.toISOString());

            // Получаем текущие ставки
            const { data: rates } = await supabaseClient.from('contribution_rates').select('*');
            const salaryRate = rates.find(r => r.name === 'salary_fee')?.amount || 0;
            const maintenanceRate = rates.find(r => r.name === 'maintenance_fee')?.amount || 0;
            const expectedSalary = salaryRate * currentUser.plots_count;
            const expectedMaintenance = maintenanceRate * currentUser.land_area;

            const salaryPaid = salaryPayments?.find(p => p.paid)?.amount || 0;
            const maintenancePaid = maintenancePayments?.find(p => p.paid)?.amount || 0;
            const debtSalary = expectedSalary - salaryPaid;
            const debtMaintenance = expectedMaintenance - maintenancePaid;
            document.getElementById('debtSalaryFee').innerText = debtSalary.toFixed(2) + ' ₽';
            document.getElementById('debtMaintenanceFee').innerText = debtMaintenance.toFixed(2) + ' ₽';
        }

        async function loadHistory() {
            const { data: meters } = await supabaseClient.from('meters').select('*').eq('user_id', currentUser.id);
            const container = document.getElementById('historyContainer');
            if (!meters.length) {
                container.innerHTML = '<p>Нет счётчиков</p>';
                return;
            }
            let html = '';
            for (const meter of meters) {
                const { data: readings } = await supabaseClient
                    .from('readings')
                    .select('*')
                    .eq('meter_id', meter.id)
                    .order('reading_date', { ascending: false });
                html += `<h5 class="mt-3">Счётчик: ${meter.meter_name}</h5>`;
                if (!readings || readings.length === 0) {
                    html += '<p>Нет показаний</p>';
                } else {
                    html += `<table class="table table-sm table-striped">
                        <thead><tr><th>Месяц</th><th>Показания</th><th>Потребление</th><th>Начислено</th><th>Оплачено</th></tr></thead>
                        <tbody>`;
                    readings.forEach(r => {
                        html += `<tr>
                            <td>${new Date(r.reading_date).toLocaleDateString('ru')}</td>
                            <td>${r.value}</td>
                            <td>${r.consumption || '—'}</td>
                            <td>${r.amount_electricity ? r.amount_electricity + ' ₽' : '—'}</td>
                            <td>${r.paid_electricity ? '✅' : '❌'}</td>
                        </tr>`;
                    });
                    html += `</tbody></table>`;
                }
            }
            container.innerHTML = html;
        }

        function showMsg(elId, msg, type) {
            const div = document.getElementById(elId);
            div.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
        document.getElementById('payElectricityBtn').addEventListener('click', async () => {
            // Отмечаем все неоплаченные показания как оплаченные
            const { data: meters } = await supabaseClient.from('meters').select('id').eq('user_id', currentUser.id);
            const meterIds = meters.map(m => m.id);
            const { error } = await supabaseClient
                .from('readings')
                .update({ paid_electricity: true })
                .in('meter_id', meterIds)
                .eq('paid_electricity', false);
            if (error) alert('Ошибка оплаты: ' + error.message);
            else {
                alert('Электроэнергия оплачена');
                await loadDebts();
            }
        });
        document.getElementById('payFeesBtn').addEventListener('click', async () => {
            const currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
            const { data: rates } = await supabaseClient.from('contribution_rates').select('*');
            const salaryRate = rates.find(r => r.name === 'salary_fee')?.amount || 0;
            const maintenanceRate = rates.find(r => r.name === 'maintenance_fee')?.amount || 0;
            const salaryAmount = salaryRate * currentUser.plots_count;
            const maintenanceAmount = maintenanceRate * currentUser.land_area;

            // Добавляем или обновляем платежи
            await supabaseClient.from('payments').upsert({
                user_id: currentUser.id,
                payment_date: new Date(),
                type: 'salary_fee',
                month: currentMonth.toISOString(),
                amount: salaryAmount,
                paid: true,
                comment: 'Оплачено через кабинет'
            }, { onConflict: 'user_id,type,month' });
            await supabaseClient.from('payments').upsert({
                user_id: currentUser.id,
                payment_date: new Date(),
                type: 'maintenance_fee',
                month: currentMonth.toISOString(),
                amount: maintenanceAmount,
                paid: true,
                comment: 'Оплачено через кабинет'
            }, { onConflict: 'user_id,type,month' });
            alert('Взносы оплачены');
            await loadDebts();
        });

        checkAuth();
    </script>
</body>
</html>
