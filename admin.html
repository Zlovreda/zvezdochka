<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-shield-lock"></i> Администрирование</h2>
            <div>
                <button id="refreshBtn" class="btn btn-secondary me-2"><i class="bi bi-arrow-repeat"></i> Обновить</button>
                <button id="logoutBtn" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Выйти</button>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-dark text-white">Тариф (₽/кВт·ч)</div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="number" step="0.1" id="tariffInput" class="form-control">
                            <button id="setTariffBtn" class="btn btn-primary">Сохранить</button>
                        </div>
                        <div id="tariffMsg" class="mt-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-dark text-white">Быстрые действия</div>
                    <div class="card-body">
                        <button id="showAllReadingsBtn" class="btn btn-info">Показать все показания</button>
                        <button id="showDebtorsBtn" class="btn btn-warning ms-2">Должники</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">Пользователи СНТ</div>
            <div class="card-body">
                <table class="table table-bordered" id="usersTable">
                    <thead><tr><th>Участок</th><th>ФИО</th><th>Логин</th><th>Действия</th></tr></thead>
                    <tbody id="usersBody"><tr><td colspan="4">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- Модальное окно для просмотра/редактирования показаний пользователя -->
        <div class="modal fade" id="readingsModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Показания: <span id="modalUserName"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <button id="addReadingModalBtn" class="btn btn-success mb-3">+ Добавить показание</button>
                        <table class="table table-sm">
                            <thead><tr><th>Месяц</th><th>Показания</th><th>Сумма</th><th>Оплачено</th><th>Действие</th></tr></thead>
                            <tbody id="modalReadingsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно добавления/редактирования показания -->
        <div class="modal fade" id="readingFormModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Показание</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="month" id="editMonth" class="form-control mb-2" placeholder="Месяц">
                        <input type="number" step="0.01" id="editValue" class="form-control mb-2" placeholder="Показания (кВт·ч)">
                        <div class="form-check mb-2">
                            <input type="checkbox" id="editPaid" class="form-check-input">
                            <label class="form-check-label">Оплачено</label>
                        </div>
                        <input type="hidden" id="editReadingId">
                        <button id="saveReadingBtn" class="btn btn-primary">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ihydjzxctlguvflswzhg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeWRqenhjdGxndXZmbHN3emhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NzY5MzUsImV4cCI6MjA4NDU1MjkzNX0.KvpKM7FggBOWNuFR8gmL7cjk64tt6CCgAI-UlkP7ZXU';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentAdmin = null;
        let currentUserIdForModal = null;
        let readingsModal, readingFormModal;

        async function checkAuth() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return window.location.href = 'index.html';
            currentAdmin = JSON.parse(userStr);
            if (currentAdmin.role !== 'admin') window.location.href = 'user.html';
        }

        async function loadUsers() {
            const { data: users, error } = await supabase.from('users').select('*').neq('role', 'admin');
            if (error) return alert('Ошибка загрузки пользователей');
            const tbody = document.getElementById('usersBody');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="4">Нет пользователей</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.plot_number || '—'}</td>
                    <td>${u.full_name || u.username}</td>
                    <td>${u.username}</td>
                    <td><button class="btn btn-sm btn-info" onclick="showReadings(${u.id}, '${u.full_name || u.username}')">Показания</button></td>
                </tr>
            `).join('');
        }

        window.showReadings = async (userId, userName) => {
            currentUserIdForModal = userId;
            document.getElementById('modalUserName').innerText = userName;
            const { data: readings } = await supabase
                .from('readings')
                .select('*')
                .eq('user_id', userId)
                .order('reading_date', { ascending: false });
            const tbody = document.getElementById('modalReadingsBody');
            if (!readings || readings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Нет показаний</td></tr>';
            } else {
                tbody.innerHTML = readings.map(r => `
                    <tr>
                        <td>${new Date(r.reading_date).toLocaleDateString('ru')}</td>
                        <td>${r.value}</td>
                        <td>${r.amount ? r.amount + ' ₽' : '—'}</td>
                        <td>${r.paid ? 'Да' : 'Нет'}</td>
                        <td><button class="btn btn-sm btn-warning" onclick="editReading(${r.id}, '${r.reading_date}', ${r.value}, ${r.paid})">✏️</button></td>
                    </tr>
                `).join('');
            }
            readingsModal.show();
        };

        window.editReading = (id, date, value, paid) => {
            const month = date.slice(0, 7); // YYYY-MM
            document.getElementById('editMonth').value = month;
            document.getElementById('editValue').value = value;
            document.getElementById('editPaid').checked = paid;
            document.getElementById('editReadingId').value = id;
            readingFormModal.show();
        };

        async function saveReading() {
            const id = document.getElementById('editReadingId').value;
            const month = document.getElementById('editMonth').value;
            const value = parseFloat(document.getElementById('editValue').value);
            const paid = document.getElementById('editPaid').checked;
            if (!month || isNaN(value)) return alert('Заполните все поля');
            const readingDate = new Date(month + '-01');
            let amount = null;
            if (id === '') {
                // Новое показание – рассчитаем amount
                const { data: tariffData } = await supabase.from('settings').select('value').eq('key', 'tariff').single();
                const tariff = parseFloat(tariffData?.value || 4);
                const { data: prev } = await supabase
                    .from('readings')
                    .select('value')
                    .eq('user_id', currentUserIdForModal)
                    .lt('reading_date', readingDate.toISOString())
                    .order('reading_date', { ascending: false })
                    .limit(1);
                let consumption = 0;
                if (prev && prev.length) consumption = value - prev[0].value;
                if (consumption > 0) amount = consumption * tariff;
                const { error } = await supabase.from('readings').insert({
                    user_id: currentUserIdForModal,
                    reading_date: readingDate.toISOString(),
                    value: value,
                    amount: amount,
                    paid: paid
                });
                if (error) return alert('Ошибка: ' + error.message);
            } else {
                // Обновление существующего
                const { error } = await supabase.from('readings').update({ value, paid }).eq('id', id);
                if (error) return alert('Ошибка: ' + error.message);
            }
            readingFormModal.hide();
            showReadings(currentUserIdForModal, document.getElementById('modalUserName').innerText);
        }

        async function loadTariff() {
            const { data } = await supabase.from('settings').select('value').eq('key', 'tariff').single();
            if (data) document.getElementById('tariffInput').value = data.value;
        }

        async function setTariff() {
            const newTariff = parseFloat(document.getElementById('tariffInput').value);
            if (isNaN(newTariff)) return;
            const { error } = await supabase.from('settings').upsert({ key: 'tariff', value: newTariff.toString() });
            if (error) showTariffMsg('Ошибка сохранения', 'danger');
            else showTariffMsg('Тариф обновлён', 'success');
        }

        function showTariffMsg(msg, type) {
            const div = document.getElementById('tariffMsg');
            div.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => div.innerHTML = '', 2000);
        }

        async function showAllReadings() {
            const { data, error } = await supabase
                .from('readings')
                .select('*, users(full_name, plot_number)')
                .order('reading_date', { ascending: false });
            if (error) return alert('Ошибка');
            let html = '<div class="card mt-3"><div class="card-header">Все показания</div><div class="card-body"><table class="table table-sm">' +
                '<thead><tr><th>Участок</th><th>ФИО</th><th>Месяц</th><th>Показания</th><th>Сумма</th><th>Оплата</th></tr></thead><tbody>';
            data.forEach(r => {
                html += `<tr>
                    <td>${r.users?.plot_number || '?'}</td>
                    <td>${r.users?.full_name || '?'}</td>
                    <td>${new Date(r.reading_date).toLocaleDateString()}</td>
                    <td>${r.value}</td>
                    <td>${r.amount ? r.amount + ' ₽' : '—'}</td>
                    <td>${r.paid ? '✅' : '❌'}</td>
                </tr>`;
            });
            html += '</tbody></table></div></div>';
            document.querySelector('.card-body').insertAdjacentHTML('afterend', html);
            setTimeout(() => document.querySelector('.extra-table')?.remove(), 5000);
        }

        async function showDebtors() {
            const { data, error } = await supabase
                .from('readings')
                .select('*, users(full_name, plot_number)')
                .eq('paid', false)
                .gt('amount', 0);
            if (error) return alert('Ошибка');
            let html = '<div class="card mt-3 bg-light"><div class="card-header">Должники</div><div class="card-body"><ul>';
            data.forEach(r => {
                html += `<li>Уч. ${r.users?.plot_number} — ${r.users?.full_name} : долг ${r.amount} ₽ (${new Date(r.reading_date).toLocaleDateString()})</li>`;
            });
            html += '</ul></div></div>';
            document.querySelector('.card-body').insertAdjacentHTML('afterend', html);
            setTimeout(() => document.querySelector('.extra-table')?.remove(), 5000);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
        document.getElementById('refreshBtn').addEventListener('click', () => loadUsers());
        document.getElementById('setTariffBtn').addEventListener('click', setTariff);
        document.getElementById('showAllReadingsBtn').addEventListener('click', showAllReadings);
        document.getElementById('showDebtorsBtn').addEventListener('click', showDebtors);
        document.getElementById('addReadingModalBtn').addEventListener('click', () => {
            document.getElementById('editReadingId').value = '';
            document.getElementById('editMonth').value = '';
            document.getElementById('editValue').value = '';
            document.getElementById('editPaid').checked = false;
            readingFormModal.show();
        });
        document.getElementById('saveReadingBtn').addEventListener('click', saveReading);

        readingsModal = new bootstrap.Modal(document.getElementById('readingsModal'));
        readingFormModal = new bootstrap.Modal(document.getElementById('readingFormModal'));

        (async () => {
            await checkAuth();
            await loadUsers();
            await loadTariff();
        })();
    </script>
</body>
</html>
